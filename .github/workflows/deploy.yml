name: Deploy API to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Adding Known Hosts
        run: ssh-keyscan -H 137.74.117.241 >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -o BatchMode=yes \
            deploy@137.74.117.241 \
            "DB_PASSWORD='${DB_PASSWORD}' JWT_SECRET='${JWT_SECRET}' bash -s" <<'REMOTE'
          set -euxo pipefail

          mkdir -p /home/deploy/api
          cd /home/deploy/api

          if [ ! -d .git ]; then
            git clone https://github.com/Emk0oo/onsort-api .
          else
            git fetch origin main
            git reset --hard origin/main
          fi

          printf 'DB_PASSWORD=%s\nJWT_SECRET=%s\n' "$DB_PASSWORD" "$JWT_SECRET" > .env

          docker compose down
          docker compose up -d --build
          docker image prune -f
          REMOTE

      - name: Verify Deployment
        run: |
          ssh -o BatchMode=yes deploy@137.74.117.241 "cd /home/deploy/api && docker compose ps"